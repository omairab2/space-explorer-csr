<main class="min-h-screen bg-slate-950 text-slate-100">
  <header class="mx-auto max-w-7xl px-4 pt-12 pb-8 sm:pt-16">
    <h1 class="text-3xl font-bold tracking-tight sm:text-5xl">Space Explorer</h1>
    <p class="mt-2 text-base text-slate-400 sm:text-lg">Daily astronomy images from NASA</p>
  </header>

  <section class="mx-auto max-w-7xl px-4 pb-16">
    @switch (status()) {
      @case ('loading') {
        <app-skeleton />
      }
      @case ('error') {
        <div
          role="alert"
          class="rounded-2xl border border-red-500/30 bg-red-500/10 p-6 text-red-200"
        >
          {{ errorMessage }}
        </div>
      }
      @case ('success') {
        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
          @for (apod of items(); track $index) {
            <app-apod-card [apod]="apod" />
          }
        </div>
      }
    }
  </section>
</main>
