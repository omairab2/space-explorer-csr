<div
  class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3"
  aria-busy="true"
  aria-hidden="true"
>
  @for (card of cards; track $index) {
    <div class="animate-pulse overflow-hidden rounded-2xl border border-slate-800 bg-slate-900">
      <div class="aspect-[4/3] w-full bg-slate-800"></div>
      <div class="space-y-3 p-4">
        <div class="h-4 w-3/4 rounded bg-slate-800"></div>
        <div class="h-3 w-1/3 rounded bg-slate-700"></div>
      </div>
    </div>
  }
</div>
