<a
  [routerLink]="['/detail', apod().date]"
  class="group block overflow-hidden rounded-2xl border border-slate-800 bg-slate-900 transition duration-200 hover:-translate-y-1 hover:border-slate-600 hover:shadow-xl hover:shadow-black/40 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-400"
>
  <div class="relative aspect-[4/3] overflow-hidden bg-slate-800">
    <img
      [src]="imageUrl()"
      [alt]="apod().title"
      loading="lazy"
      class="h-full w-full object-cover transition duration-300 group-hover:scale-105"
    />

    @if (isVideo()) {
      <span
        class="absolute inset-0 flex items-center justify-center bg-black/40"
        aria-hidden="true"
      >
        <svg class="h-14 w-14 text-white/90 drop-shadow-lg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
      </span>
    }
  </div>

  <div class="p-4">
    <h2 class="line-clamp-2 text-base font-semibold text-slate-100">{{ apod().title }}</h2>
    <time class="mt-1 block text-sm text-slate-400" [attr.datetime]="apod().date">
      {{ apod().date | date: 'longDate' }}
    </time>
  </div>
</a>
